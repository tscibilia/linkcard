name: Labeler

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Apply labels from PR title
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];

            if (title.startsWith('feat')) labels.push('enhancement');
            else if (title.startsWith('fix')) labels.push('bug');
            else if (title.startsWith('chore(deps)')) labels.push('dependencies');
            else if (title.startsWith('chore')) labels.push('maintenance');
            else if (title.startsWith('revert')) labels.push('revert');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
            }
