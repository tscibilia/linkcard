name: Test

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches:
      - main

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t linkcard:test .

      - name: Start container
        run: |
          docker run -d --name test-app \
            -p 3000:3000 \
            -v ${{ github.workspace }}/example.config.json:/app/config.json:ro \
            -e PORT=3000 \
            linkcard:test

      - name: Wait for healthy
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "App is up"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start"
          docker logs test-app
          exit 1

      - name: E2E — serves frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          [ "$STATUS" = "200" ] || { echo "Expected 200, got $STATUS"; exit 1; }

      - name: E2E — health check
        run: |
          BODY=$(curl -s http://localhost:3000/healthz)
          [ "$BODY" = "ok" ] || { echo "Expected 'ok', got '$BODY'"; exit 1; }

      - name: E2E — static assets load
        run: |
          curl -sf http://localhost:3000/static/style.css > /dev/null

      - name: E2E — 404 on unknown route
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/nonexistent)
          [ "$STATUS" = "404" ] || { echo "Expected 404, got $STATUS"; exit 1; }

      - name: E2E — container runs as non-root
        run: |
          USER=$(docker exec test-app whoami)
          echo "Running as: $USER"
          [ "$USER" != "root" ] || { echo "Container is running as root!"; exit 1; }

      - name: Cleanup
        if: always()
        run: docker rm -f test-app 2>/dev/null || true
